version: "3.9"

services:
  db:
    image: pgvector/pgvector:pg17
    container_name: enterprise-support-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-enterprise_support}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-enterprise_support}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:

